version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: teamovictor_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - teamovictor-network

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - teamovictor-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamovictor
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - teamovictor-network

networks:
  teamovictor-network:
    driver: bridge

volumes:
  db_data:
